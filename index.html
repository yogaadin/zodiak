<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Variabel & Desain Sistem (Cosmic Bubble) --- */
        :root[data-theme="dark"] {
            --bg-global: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #090514 100%);
            --bg-card: #151226;
            --bg-inner-card: #221c3d;
            --bg-tag: rgba(255, 255, 255, 0.08);
            --border-color: #312e81;
            --text-primary: #ffffff;
            --text-secondary: #c7d2fe;
            --text-muted: #818cf8;
            --btn-bg: #818cf8;
            --btn-text: #090514;
            --card-shadow: 8px 8px 0px #090514;
            --bubble-shadow: inset -4px -4px 0px rgba(0,0,0,0.2);
        }

        :root[data-theme="light"] {
            --bg-global: radial-gradient(circle at 50% 50%, #e0e7ff 0%, #c7d2fe 100%);
            --bg-card: #ffffff;
            --bg-inner-card: #f3f4f6;
            --bg-tag: rgba(0, 0, 0, 0.05);
            --border-color: #1e1b4b;
            --text-primary: #1e1b4b;
            --text-secondary: #4338ca;
            --text-muted: #6366f1;
            --btn-bg: #ff763d;
            --btn-text: #ffffff;
            --card-shadow: 6px 6px 0px #1e1b4b;
            --bubble-shadow: inset -4px -4px 0px rgba(0,0,0,0.15);
        }

        /* --- Reset & Base --- */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s, border-color 0.3s;
            font-family: 'Fredoka', sans-serif;
        }
        
        body { 
            background: var(--bg-global); 
            color: var(--text-primary); 
            min-height: 100vh; 
            padding: 2rem 1rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        /* --- Main Container --- */
        .app-container { 
            width: 100%; 
            max-width: 900px; 
            background: var(--bg-card); 
            border: 4px solid var(--border-color); 
            border-radius: 40px; 
            padding: 3rem 2.5rem; 
            box-shadow: var(--card-shadow); 
            display: grid; 
            grid-template-columns: 1fr 1.1fr; 
            gap: 2.5rem; 
            position: relative; 
        }

        .theme-toggle { 
            position: absolute; 
            top: -20px; 
            right: 30px; 
            background: var(--btn-bg); 
            border: 3px solid var(--border-color); 
            padding: 10px 20px; 
            border-radius: 50px; 
            color: var(--btn-text); 
            font-size: 14px; 
            font-weight: 700; 
            cursor: pointer; 
            box-shadow: 4px 4px 0px var(--border-color);
        }
        .theme-toggle:active { transform: translateY(4px) translateX(4px); box-shadow: 0px 0px 0px var(--border-color); }

        /* --- Kolom Kiri --- */
        .input-side { display: flex; flex-direction: column; justify-content: center; }
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 0.75rem; }
        .brand-icon { font-size: 40px; animation: bounce 2.5s infinite alternate; }
        
        h1 { font-size: 32px; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
        .sub-title { font-size: 15px; color: var(--text-secondary); margin-bottom: 2rem; font-weight: 400; }

        .form-group { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 14px; font-weight: 600; color: var(--text-muted); padding-left: 5px; }
        
        .input-wrapper { display: flex; gap: 12px; }
        
        select, input { 
            flex: 1; 
            height: 54px; 
            background: var(--bg-inner-card); 
            border: 3px solid var(--border-color); 
            border-radius: 20px; 
            padding: 0 20px; 
            color: var(--text-primary); 
            font-size: 16px; 
            font-weight: 600; 
            outline: none; 
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }
        input::placeholder { color: var(--text-muted); opacity: 0.6; }
        select:focus, input:focus { transform: scale(1.02); background: var(--bg-card); }
        select option { background-color: var(--bg-card); color: var(--text-primary); }

        .btn-submit { 
            width: 100%; 
            height: 56px; 
            background: var(--btn-bg); 
            color: var(--btn-text); 
            border: 3px solid var(--border-color); 
            border-radius: 25px; 
            font-size: 18px; 
            font-weight: 700; 
            cursor: pointer;

            align-items: center; 
            justify-content: center; 
            gap: 8px;

        .btn-submit:active { transform: translateY(4px) translateX(4px); box-shadow: 0px 0px 0px var(--border-color); }

        /* --- Kolom Kanan --- */
        .result-side { 
            background: var(--bg-inner-card); 
            border: 3px dashed var(--border-color); 
            border-radius: 30px; 
            padding: 2rem;
            display: flex; 
            align-items: center; 
            justify-content: center;

        .zodiac-header {

            margin-bottom: 1.25rem; 
            background: var(--bg-card);
            border: 3px solid var(--border-color); 
            padding: 1.2rem; 
            border-radius: 24px; 
            box-shadow: 4px 4px 0px var(--border-color);

        .zodiac-symbol { 
            font-size: 50px; 
            width: 70px; 
            height: 70px; 
            background: var(--bg-inner-card);
            border: 3px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--bubble-shadow);
        }
        .zodiac-name { font-size: 26px; font-weight: 700; color: var(--text-primary); }
        .zodiac-range { font-size: 13px; color: var(--text-muted); font-weight: 500; }
        
        .element-badge { 
            display: inline-block; 
            font-size: 11px; 
            font-weight: 700; 
            padding: 4px 12px; 
            border-radius: 50px; 
            margin-top: 6px;
            border: 2px solid var(--border-color);
            box-shadow: var(--bubble-shadow);
        }

        .compatibility-box { text-align: center; background: var(--bg-inner-card); padding: 8px 12px; border-radius: 16px; border: 2px solid var(--border-color); }
        .comp-val { font-size: 24px; font-weight: 800; color: var(--btn-bg); }
        .comp-lbl { font-size: 11px; color: var(--text-muted); font-weight: 600; }

        /* Grid Atribut */
        .attr-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1.25rem; }
        .attr-block { 
            background: var(--bg-card); 
            border: 3px solid var(--border-color); 
            border-radius: 20px; 
            padding: 10px; 
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 3px 3px 0px var(--border-color);
        }
        .attr-icon { font-size: 24px; }
        .attr-info { display: flex; flex-direction: column; }
        .attr-label { font-size: 11px; color: var(--text-muted); font-weight: 600; }
        .attr-value { font-size: 13px; color: var(--text-primary); font-weight: 700; }

        /* Sifat Tags */
        .section-title { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .sifat-flex { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; }
        .sifat-tag { 
            font-size: 13px; 
            font-weight: 600; 
            padding: 6px 14px; 
            border-radius: 50px; 
            background: var(--bg-card); 
            border: 2px solid var(--border-color); 
            color: var(--text-primary); 
            box-shadow: var(--bubble-shadow);

        /* --- NEW: Bubble untuk Rekomendasi Karier --- */
        .career-box {
            background: var(--bg-card);
            border: 3px solid var(--border-color);
            padding: 1rem;
            border-radius: 24px;
            box-shadow: 4px 4px 0px var(--border-color);
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;

        }
        .career-icon { font-size: 32px; background: var(--bg-inner-card); padding: 8px; border-radius: 16px; border: 2px solid var(--border-color); }
        .career-text-wrapper { display: flex; flex-direction: column; }

        .career-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; font-weight: 500; }

        .character-box { 
            background: var(--bg-card); 
            border: 3px solid var(--border-color); 
            padding: 1.2rem; 
            border-radius: 24px; 
            box-shadow: 4px 4px 0px var(--border-color);
        }
        .desc-text { font-size: 14px; color: var(--text-secondary); line-height: 1.6; font-weight: 500; }

        /* --- Animations --- */
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-10px) rotate(5deg); } }
        @keyframes bounce { 0% { transform: scale(1); } 100% { transform: scale(1.1) rotate(-3deg); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container { grid-template-columns: 1fr; gap: 2rem; padding: 2rem 1.5rem; margin-top: 1.5rem; }
            body { padding: 1rem; }
            .theme-toggle { top: -15px; right: 20px; }
        }
    </style>
</head>

function getZodiak(d, m) {
  if ((m===1&&d>=20)||(m===2&&d<=18)) return zodiaks[10];
  if ((m===2&&d>=19)||(m===3&&d<=20)) return zodiaks[11];
  if ((m===3&&d>=21)||(m===4&&d<=19)) return zodiaks[0];
  if ((m===4&&d>=20)||(m===5&&d<=20)) return zodiaks[1];
  if ((m===5&&d>=21)||(m===6&&d<=20)) return zodiaks[2];
  if ((m===6&&d>=21)||(m===7&&d<=22)) return zodiaks[3];
  if ((m===7&&d>=23)||(m===8&&d<=22)) return zodiaks[4];
  if ((m===8&&d>=23)||(m===9&&d<=22)) return zodiaks[5];
  if ((m===9&&d>=23)||(m===10&&d<=22)) return zodiaks[6];
  if ((m===10&&d>=23)||(m===11&&d<=21)) return zodiaks[7];
  if ((m===11&&d>=22)||(m===12&&d<=21)) return zodiaks[8];
  return zodiaks[9];
}

function toggleTheme() {

    if(html.getAttribute('data-theme') === 'dark') {
        html.setAttribute('data-theme', 'light');
        btn.innerHTML = '☀️ Terang';
    } else {
        html.setAttribute('data-theme', 'dark');
        btn.innerHTML = '🌙 Gelap';
    }
}
</script>

</body>
</html>
