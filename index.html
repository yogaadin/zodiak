<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrologia - Ramalan & Kecocokan Zodiak</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>ASTROLOGIA</h1>
            <p>Ungkap Rahasia Bintang & Kecocokan Jiwamu</p>
        </header>

        <div class="form-group">
            <label for="birthdate">Tanggal Lahir Kamu</label>
            <input type="date" id="birthdate" required>
        </div>

        <div class="form-group">
            <label for="partner-zodiac">Cek Kecocokan Dengan Zodiak Dia (Opsional)</label>
            <select id="partner-zodiac">
                <option value="">-- Pilih Zodiak Dia --</option>
                <option value="Aries">Aries</option>
                <option value="Taurus">Taurus</option>
                <option value="Gemini">Gemini</option>
                <option value="Cancer">Cancer</option>
                <option value="Leo">Leo</option>
                <option value="Virgo">Virgo</option>
                <option value="Libra">Libra</option>
                <option value="Scorpio">Scorpio</option>
                <option value="Sagittarius">Sagitarius</option>
                <option value="Capricorn">Capricorn</option>
                <option value="Aquarius">Aquarius</option>
                <option value="Pisces">Pisces</option>
            </select>
        </div>

        <button onclick="revealDestiny()">Ramal Sekarang</button>

        <div class="result-box" id="resultBox">
            <div class="zodiac-header">
                <div class="zodiac-icon" id="zodiacIcon">🔮</div>
                <div class="zodiac-info">
                    <h2 id="zodiacName">Zodiak Kamu</h2>
                    <p id="zodiacDateRange">Rentang Tanggal</p>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab(event, 'ramalan')">Ramalan</button>
                <button class="tab-btn" onclick="switchTab(event, 'kecocokan')">Kecocokan</button>
            </div>

            <div id="ramalan" class="tab-content active">
                <p id="forecastText">Mengambil data ramalan bintangmu...</p>
            </div>

            <div id="kecocokan" class="tab-content">
                <p id="partnerMatchText" style="margin-bottom: 15px; font-weight: 500; color: var(--accent-cyan);"></p>
                <p style="font-size: 0.85rem; color:#aaa; margin-bottom: 10px;">Zodiak yang paling cocok secara umum:</p>
                <div class="compatibility-list" id="generalCompList">
                    </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
