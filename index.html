<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 Cosmic Check — Detektor Zodiak Gen Z</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Menggunakan font Fredoka yang bulat dan playful -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <!-- Menyambungkan ke file CSS eksternal -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Gelap</button>

    <!-- Kolom Kiri: Form Input -->
    <div class="input-side">
        <div class="brand">
            <span class="brand-icon">🔮</span>
            <h1>Cosmic Check.</h1>
        </div>
        <p class="sub-title">Cek seberapa 'kamu banget' zodiakmu dengan ramalan kosmis yang anti-boring!</p>
        
        <div class="form-group">
            <label>Panggilan Lu Siapa?</label>
            <input type="text" id="username" placeholder="Ketik nama lo di sini..." autocomplete="off">
        </div>

        <div class="form-group">
            <label>Kapan Tiup Lilin?</label>
            <div class="input-wrapper">
                <select id="day"></select>
                <select id="month"></select>
            </div>
        </div>

        <button class="btn-submit" onclick="generateZodiac()">✨ Spill Kepribadian Gue!</button>
    </div>

    <!-- Kolom Kanan: Tampilan Hasil -->
    <div class="result-side" id="resultContainer">
        <div class="placeholder-view">
            <div class="icon">🛸</div>
            <p>Isi data lo di kiri dulu gais buat memanggil energi rasi bintang!</p>
        </div>
    </div>
</div>

<!-- Menyambungkan ke file JavaScript eksternal -->
<script src="script.js"></script>
</body>
</html>
